# 后端流水线：测试 → 构建推送镜像（腾讯云 TCR）→ SSH 部署到云服务器
#
# 需要在 GitHub 仓库 Settings → Secrets and variables → Actions 配置：
#   TCR_USERNAME  腾讯云 TCR 登录用户名（容器镜像服务的用户名/腾讯云账号 ID）
#   TCR_PASSWORD  TCR 登录密码
#   SSH_HOST      云服务器公网 IP 或域名
#   SSH_USER      SSH 用户名（如 root / ubuntu）
#   SSH_KEY       SSH 私钥（部署专用密钥的私钥全文）

name: backend

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend.yml']

env:
  IMAGE: ccr.ccs.tencentyun.com/mz_personal_namespace/jetset-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  build-push:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # GitHub Runner 在海外，走官方源比国内镜像快
          build-args: |
            PIP_INDEX_URL=https://pypi.org/simple

  deploy:
    if: github.event_name == 'push'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/jetset
            echo '${{ secrets.TCR_PASSWORD }}' | docker login ccr.ccs.tencentyun.com -u '${{ secrets.TCR_USERNAME }}' --password-stdin
            docker compose pull api worker
            docker compose up -d
            docker image prune -f
