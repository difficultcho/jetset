# 显式项目名，避免与其他同目录名项目（如 golf 的 backend）冲突
name: jetset

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env          # DATABASE_URL 由 .env 提供（指向外部 MySQL）
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/code
      - upload_data:/code/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_started

  worker:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/code
    command: arq app.worker.WorkerSettings
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  upload_data:
