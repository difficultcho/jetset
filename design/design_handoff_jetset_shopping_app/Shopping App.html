<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ─── DATA ─── */

   colors:['冰蓝色','灰色'],sw:['#6B9BD2','#888'],sizes:['均码'],desc:'高密度缓冲背板，符合欧洲雪具安全标准，专为高速滑降场景设计。'},
];
const LCATS=['冲锋衣','包类','短裤','开衫','登山鞋','短袖','滑雪'];

/* ─── PRIMITIVES ─── */
function PImg({prod,w=80,h=80,ci=0,style:st={},onClick}){
  const c=(prod.sw||['#888'])[Math.min(ci,prod.sw.length-1)];
  const nw=typeof w==='number'?w:80;
  return(
    <div onClick={onClick} style={{width:w,height:h,background:`${c}14`,
      border:`1px solid ${c}30`,display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0,...st}}>
      <div style={{display:'flex',alignItems:'center',gap:3,opacity:0.75}}>
        <img src="assets/jetset-logo.png" style={{height:9,filter:'grayscale(1)'}}/>
        <span style={{fontSize:7.5,color:c,fontWeight:900,letterSpacing:1}}>JETSET</span>
      </div>
      <div style={{width:'55%',height:1,background:c,margin:'4px 0',opacity:0.25}}/>
      <div style={{width:nw*0.42,height:nw*0.42,borderRadius:'50%',
        background:`${c}20`,display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
        <div style={{width:nw*0.22,height:nw*0.22,background:c,opacity:0.35,borderRadius:3,transform:'rotate(12deg)'}}/>
      </div>
      <div style={{fontSize:6.5,color:'#aaa',marginTop:3,textAlign:'center',padding:'0 6px',lineHeight:1.3}}>{prod.en}</div>
    </div>
  );
}

function Chevron({c='#ccc'}){
  return<svg width="7"height="11"viewBox="0 0 7 11"fill="none"><path d="M1 1l5 4.5L1 10"stroke={c}strokeWidth="1.6"strokeLinecap="round"/></svg>;
}
function BackIcon({light}){
  return<svg width="10"height="16"viewBox="0 0 10 16"fill="none"><path d="M8 2L2 8L8 14"stroke={light?'#fff':'#333'}strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"/></svg>;
}

function MIcon({name,size=22,color='#6b6459'}){
  const s={width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:'1.5',strokeLinecap:'round',strokeLinejoin:'round'};
  const paths={
    pay:<><rect x="3"y="6"width="18"height="13"rx="2"/><path d="M3 10h18"/><path d="M7 15h4"/></>,
    ship:<><rect x="2"y="7"width="13"height="9"rx="1"/><path d="M15 10h3l3 3v3h-6z"/><circle cx="7"cy="18"r="1.6"/><circle cx="17.5"cy="18"r="1.6"/></>,
    truck:<><path d="M3 16V6h9v10"/><path d="M12 10h4l4 3v3h-8"/><circle cx="7"cy="18.5"r="1.5"/><circle cx="17"cy="18.5"r="1.5"/></>,
    star:<path d="M12 3l2.6 5.6 6.1.6-4.6 4.1 1.3 6-5.4-3.1-5.4 3.1 1.3-6-4.6-4.1 6.1-.6z"/>,
    refund:<><path d="M4 9a8 8 0 1114 5.5"/><path d="M4 4v5h5"/></>,
    cart:<><path d="M3 4h2.2l2.8 10.5H17l2.5-8H6"/><circle cx="10"cy="20"r="1.4"/><circle cx="16"cy="20"r="1.4"/></>,
    task:<><rect x="4"y="3"width="16"height="18"rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></>,
    gift:<><rect x="3"y="8"width="18"height="13"rx="1"/><path d="M3 12h18"/><path d="M12 8v13"/><path d="M12 8c-1.5-4-6-4-6-1.2C6 8.5 8 8 12 8zM12 8c1.5-4 6-4 6-1.2C18 8.5 16 8 12 8z"/></>,
    chat:<><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></>,
    shop2:<><path d="M3 9l1-5h16l1 5"/><path d="M3 9a2.5 2.5 0 005 0 2.5 2.5 0 005 0 2.5 2.5 0 005 0 2.5 2.5 0 005 0"/><path d="M5 9v10h14V9"/><path d="M9.5 19v-5h5v5"/></>,
  };
  return<svg {...s}>{paths[name]}</svg>;
}

function SBar({light,abs}){
  return(
    <div style={{height:44,flexShrink:0,display:'flex',alignItems:'center',
      justifyContent:'space-between',padding:'0 20px',zIndex:10,
      position:abs?'absolute':'relative',top:0,left:0,right:0,
      background:abs?'transparent':light?'transparent':'#fff',
      color:light?'#fff':'#1a1a1a'}}>
      <span style={{fontSize:15,fontWeight:700}}>21:50</span>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        <span style={{fontSize:11,fontWeight:600}}>5G</span>
        <svg width="18"height="10"viewBox="0 0 18 10"fill={light?'#fff':'#1a1a1a'}>
          <rect x="0"y="3"width="3"height="7"rx="0.5"/>
          <rect x="4.5"y="1.5"width="3"height="8.5"rx="0.5"/>
          <rect x="9"y="0"width="3"height="10"rx="0.5"/>
          <rect x="13.5"y="0"width="3"height="10"rx="0.5"opacity="0.3"/>
        </svg>
        <svg width="24"height="11"viewBox="0 0 24 11"fill="none">
          <rect x="0.5"y="0.5"width="20"height="10"rx="2.5"stroke={light?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.35)'}/>
          <rect x="1.5"y="1.5"width="14"height="8"rx="1.5"fill={light?'#fff':'#1a1a1a'}/>
          <path d="M22 3.5v4a2 2 0 000-4z"fill={light?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.3)'}/>
        </svg>
      </div>
    </div>
  );
}

function NHdr({title,onBack,light,right,noBorder}){
  return(
    <div style={{height:44,flexShrink:0,display:'flex',alignItems:'center',
      justifyContent:'center',position:'relative',zIndex:5,
      background:light?'transparent':'#fff',
      borderBottom:noBorder||light?'none':'1px solid #f0f0f0',
      color:light?'#fff':'#1a1a1a'}}>
      {onBack&&<div onClick={onBack} style={{position:'absolute',left:14,cursor:'pointer',padding:'4px 8px 4px 0'}}><BackIcon light={light}/></div>}
      <span style={{fontSize:16,fontWeight:600}}>{title}</span>
      {right&&<div style={{position:'absolute',right:14}}>{right}</div>}
    </div>
  );
}

function Scr({children,bg='#f5f5f5',style:st={},...rest}){
  return<div style={{height:'100%',display:'flex',flexDirection:'column',background:bg,...st}} {...rest}>{children}</div>;
}
function Sv({children,style:st={}}){
  return<div style={{flex:1,overflowY:'auto',...st}}>{children}</div>;
}
function Div8(){return<div style={{height:8,background:'#f5f5f5',flexShrink:0}}/>;}
function SecHdr({label}){
  return<div style={{padding:'8px 16px',background:'#f0f0f0',fontSize:12,color:'#888',fontWeight:500,flexShrink:0}}>{label}</div>;
}
function Row({label,value,onClick,border=true}){
  return(
    <div onClick={onClick} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'13px 16px',background:'#fff',borderBottom:border?'1px solid #f5f5f5':'none',cursor:onClick?'pointer':'default'}}>
      <span style={{fontSize:14,color:'#333'}}>{label}</span>
      <span style={{fontSize:14,color:'#999',display:'flex',alignItems:'center',gap:6}}>
        {value}{onClick&&<Chevron/>}
      </span>
    </div>
  );
}
function Btn({label,onClick,outline,disabled,style:st={}}){
  return(
    <button onClick={onClick} disabled={disabled}
      style={{padding:'13px',background:disabled?'#e0e0e0':outline?'#fff':'#1a1a1a',
        color:disabled?'#aaa':outline?'#1a1a1a':'#fff',
        border:outline?'1px solid #1a1a1a':'none',
        borderRadius:24,fontSize:15,fontWeight:500,cursor:disabled?'not-allowed':'pointer',
        fontFamily:'inherit',width:'100%',...st}}>
      {label}
    </button>
  );
}

/* ─── TAB BAR ─── */
function TabBar({active,onChange,cnt}){
  const tabs=[
    {k:'home',l:'首页',icon:a=>(
      <svg width="24"height="24"viewBox="0 0 24 24"fill="none">
        <path d="M3 10.5L12 3l9 7.5V21h-6v-6H9v6H3z"stroke={a?'#000':'#bbb'}strokeWidth="1.6"fill={a?'#000':'none'}/>
      </svg>)},
    {k:'shop',l:'商品',icon:a=>(
      <svg width="24"height="24"viewBox="0 0 24 24"fill="none">
        <rect x="3"y="7"width="18"height="14"rx="2"stroke={a?'#000':'#bbb'}strokeWidth="1.6"/>
        <path d="M8 7V5a4 4 0 018 0v2"stroke={a?'#000':'#bbb'}strokeWidth="1.6"strokeLinecap="round"/>
        <path d="M8 13h8M8 17h5"stroke={a?'#000':'#bbb'}strokeWidth="1.5"strokeLinecap="round"/>
      </svg>)},
    {k:'cart',l:'购物车',icon:a=>(
      <svg width="24"height="24"viewBox="0 0 24 24"fill="none">
        <path d="M2 3h2.2l2.8 10.5H17l2.5-8H6"stroke={a?'#000':'#bbb'}strokeWidth="1.6"strokeLinecap="round"strokeLinejoin="round"/>
        <circle cx="10"cy="20"r="1.5"fill={a?'#000':'#bbb'}/>
        <circle cx="16"cy="20"r="1.5"fill={a?'#000':'#bbb'}/>
      </svg>)},
    {k:'wholesale',l:'批发',icon:a=>(
      <svg width="24"height="24"viewBox="0 0 24 24"fill="none">
        <rect x="4"y="2"width="16"height="20"rx="2"stroke={a?'#000':'#bbb'}strokeWidth="1.6"/>
        <path d="M8 8h8M8 12h8M8 16h5"stroke={a?'#000':'#bbb'}strokeWidth="1.5"strokeLinecap="round"/>
      </svg>)},
    {k:'mine',l:'我的',icon:a=>(
      <svg width="24"height="24"viewBox="0 0 24 24"fill="none">
        <circle cx="12"cy="8"r="4"stroke={a?'#000':'#bbb'}strokeWidth="1.6"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"stroke={a?'#000':'#bbb'}strokeWidth="1.6"strokeLinecap="round"/>
      </svg>)},
  ];
  return(
    <div style={{height:82,borderTop:'1px solid #e8e8e8',background:'#fff',display:'flex',flexShrink:0}}>
      {tabs.map(t=>(
        <div key={t.k} onClick={()=>onChange(t.k)}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
            justifyContent:'center',gap:3,cursor:'pointer',position:'relative',paddingBottom:16}}>
          {t.icon(active===t.k)}
          {t.k==='cart'&&cnt>0&&(
            <div style={{position:'absolute',top:6,left:'50%',marginLeft:3,
              background:'#ff3b30',color:'#fff',borderRadius:10,fontSize:9,
              fontWeight:700,minWidth:15,height:15,display:'flex',
              alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{cnt}</div>
          )}
          <span style={{fontSize:10,color:active===t.k?'#000':'#bbb',fontWeight:active===t.k?600:400}}>{t.l}</span>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════
   HOME TAB
══════════════════════════════════ */
function HomeTab({goTab}){
  const [slide,setSlide]=useState(0);
  const slides=[
    {title:'山海无界  陪伴无休',sub:'EXPLORE WITHOUT LIMITS'},
    {title:'专业户外  品质之选',sub:'PROFESSIONAL OUTDOOR GEAR'},
    {title:'瑞士阿尔卑斯  滑雪季',sub:'SWISS ALPS SKI SEASON'},
  ];
  useEffect(()=>{const t=setInterval(()=>setSlide(s=>(s+1)%3),3500);return()=>clearInterval(t);},[]);

  return(
    <Scr bg="#f5f5f5" style={{position:'relative'}}>
      {/* HERO */}
      <div style={{flexShrink:0,height:290,position:'relative',overflow:'hidden',
        background:slide===0?'#141410':slide===1?'#101418':'#101014',transition:'background 0.8s'}}>
        <SBar light abs/>
        {/* Decorative */}
        <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
          <div style={{position:'absolute',top:-60,right:-60,width:280,height:280,
            borderRadius:'50%',background:'rgba(255,255,255,0.015)'}}/>
          <div style={{position:'absolute',bottom:-80,left:-40,width:320,height:320,
            borderRadius:'50%',background:'rgba(255,255,255,0.015)'}}/>
          <div style={{position:'absolute',top:60,left:-10,fontSize:90,fontWeight:900,
            color:'rgba(255,255,255,0.025)',letterSpacing:-2,lineHeight:1}}>JETSET</div>
          {/* Outdoor silhouette abstraction */}
          <svg style={{position:'absolute',right:20,bottom:60,opacity:0.06}} width="120"height="80"viewBox="0 0 120 80"fill="white">
            <path d="M20 80L60 10L100 80z"/>
            <path d="M0 80L35 30L70 80z"/>
          </svg>
        </div>
        <div style={{position:'absolute',top:8,left:0,right:0,textAlign:'center',zIndex:5,display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
          <img src="assets/jetset-logo.png" style={{height:20,filter:'invert(1) brightness(1.6)'}}/>
          <span style={{fontSize:17,fontWeight:900,color:'#fff',letterSpacing:3}}>JETSET</span>
        </div>
        <div style={{position:'absolute',bottom:52,left:0,right:0,textAlign:'center',padding:'0 24px',zIndex:5,transition:'opacity 0.4s'}}>
          <div style={{fontSize:22,fontWeight:700,color:'#fff',letterSpacing:3,textShadow:'0 2px 12px rgba(0,0,0,0.6)'}}>{slides[slide].title}</div>
          <div style={{fontSize:9,color:'rgba(255,255,255,0.5)',letterSpacing:4,marginTop:8}}>{slides[slide].sub}</div>
        </div>
        {/* Dots */}
        <div style={{position:'absolute',bottom:24,left:0,right:0,display:'flex',justifyContent:'center',gap:6,zIndex:5}}>
          {[0,1,2].map(i=>(
            <div key={i} onClick={()=>setSlide(i)}
              style={{width:i===slide?22:5,height:3,borderRadius:2,cursor:'pointer',
                background:i===slide?'#fff':'rgba(255,255,255,0.35)',transition:'all 0.3s'}}/>
          ))}
        </div>
      </div>

      <Sv>
        {/* Section header */}
        <div style={{background:'#fff',padding:'18px 0 10px',textAlign:'center',borderBottom:'1px solid #f0f0f0'}}>
          <div style={{fontSize:19,fontWeight:700,letterSpacing:1}}>热销推荐</div>
          <div style={{fontSize:9,color:'#bbb',letterSpacing:3,marginTop:3}}>HOT SELLING RECOMMENDATIONS</div>
        </div>
        {/* Horizontal scroll */}
        <div style={{background:'#fff',paddingBottom:14}}>
          <div style={{display:'flex',overflowX:'auto',padding:'12px 16px 0',gap:10,WebkitOverflowScrolling:'touch'}}>
            {PRODS.slice(0,5).map(p=>(
              <div key={p.id} onClick={()=>goTab('shop')} style={{flexShrink:0,width:148,cursor:'pointer',
                background:'#f8f8f8',borderRadius:10,overflow:'hidden',border:'1px solid #f0f0f0'}}>
                <PImg prod={p} w={148} h={128} style={{borderRadius:0,width:148,height:128}}/>
                <div style={{padding:'8px 10px 10px'}}>
                  <div style={{fontSize:12,color:'#333',lineHeight:1.45,height:35,overflow:'hidden',
                    display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{p.name}</div>
                  <div style={{fontSize:14,fontWeight:700,color:'#1a1a1a',marginTop:5}}>¥{p.price}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <Div8/>
        {/* Featured card */}
        <div style={{background:'#fff',padding:'14px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:14,fontWeight:600,color:'#1a1a1a'}}>精选好物</span>
            <span onClick={()=>goTab('shop')} style={{fontSize:12,color:'#999',cursor:'pointer'}}>查看全部 ›</span>
          </div>
          <div onClick={()=>goTab('shop')} style={{cursor:'pointer',borderRadius:12,overflow:'hidden',
            border:`1px solid ${PRODS[2].sw[0]}22`}}>
            <PImg prod={PRODS[2]} w={'100%'} h={190} style={{width:'100%',height:190,borderRadius:0}}/>
            <div style={{padding:'12px 14px 14px',background:`${PRODS[2].sw[0]}08`,
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:9,color:'#aaa',letterSpacing:1}}>JETSET – {PRODS[2].en}</div>
                <div style={{fontSize:15,fontWeight:600,color:'#1a1a1a',marginTop:2}}>{PRODS[2].name}</div>
              </div>
              <div style={{background:'#1a1a1a',color:'#fff',borderRadius:20,
                padding:'8px 14px',fontSize:13,fontWeight:700,whiteSpace:'nowrap'}}>¥{PRODS[2].price}</div>
            </div>
          </div>
        </div>
        <Div8/>
        {/* 2-col grid */}

/* ──── SHOP TAB ──── */
function ShopTab({cart,setCart,addresses,setOrders,goTab}){
  const [page,setPage]=useState({t:'list'});
  const addToCart=item=>setCart(c=>[...c,item]);
  const orderNow=item=>{setPage({t:'order',items:[item]});};
  const submitOrder=items=>{
    setOrders(o=>[{id:Date.now(),items,status:'待付款',date:'2026-04-22'},...o]);
    setPage({t:'list'});goTab('mine');
  };

  if(page.t==='list') return<ShopList onProd={p=>setPage({t:'detail',prod:p})} setCart={setCart}/>;
  if(page.t==='detail') return<ProdDetail prod={page.prod}
    onBack={()=>setPage({t:'list'})}
    onAddToCart={item=>{addToCart(item);}}
    onOrderNow={item=>orderNow(item)}/>;
  if(page.t==='order') return<OrderConfirm items={page.items} addresses={addresses}
    onBack={()=>setPage({t:'detail',prod:page.items[0].prod})}
    onSubmit={()=>submitOrder(page.items)}/>;
  return null;
}

              </div>
              <div style={{marginTop:7}}>
                <span style={{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(214,190,148,0.4)',borderRadius:12,
                  padding:'3px 12px',fontSize:11,color:'#d6be94',cursor:'pointer'}}>
                  会员中心
                </span>
              </div>
            </div>
          </div>
        </div>

        {/* Member card */}
        <div style={{margin:'0 12px',background:'linear-gradient(135deg,#211e1a 0%,#312c24 100%)',
          border:'1px solid rgba(214,190,148,0.18)',borderTop:'none',
          borderRadius:'0 0 12px 12px',padding:'11px 16px 13px',marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <img src="assets/jetset-logo.png" style={{height:13,filter:'invert(1) brightness(1.5)'}}/>
              <span style={{fontSize:13,color:'#ece6dc',fontWeight:700,letterSpacing:2}}>JETSET</span>
            </div>
            <span style={{fontSize:12,color:'rgba(214,190,148,0.75)',cursor:'pointer'}}>成为会员 ›</span>
          </div>
        </div>

        {/* Stats */}
        <div style={{background:'#fff',display:'flex',padding:'16px 0',marginBottom:8}}>
          {[{l:'余额',v:'0.00'},{l:'积分',v:'0'},{l:'卡',v:'0'},{l:'优惠券/码',v:'0'},{l:'钱包',v:'⊙'}].map((it,i)=>(
            <div key={i} style={{flex:1,textAlign:'center',cursor:'pointer',
              borderRight:i<4?'1px solid #f0f0f0':'none'}}>
              <div style={{fontSize:15,fontWeight:600,color:'#1a1a1a'}}>{it.v}</div>
              <div style={{fontSize:10,color:'#aaa',marginTop:3}}>{it.l}</div>
            </div>
          ))}
        </div>

        {/* Orders */}
        <div style={{background:'#fff',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px 8px'}}>
            <span style={{fontSize:15,fontWeight:600}}>我的订单</span>
            <span onClick={()=>setPage('orders')} style={{fontSize:12,color:'#aaa',cursor:'pointer'}}>查看全部订单 ›</span>
          </div>
          <div style={{display:'flex',padding:'8px 0 14px'}}>
            {oStats.map(o=>(
              <div key={o.l} onClick={()=>setPage('orders')}
                style={{flex:1,textAlign:'center',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center'}}>
                <MIcon name={o.n} size={21}/>
                <div style={{fontSize:10,color:'#777',marginTop:6}}>{o.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Menu */}
        <div style={{background:'#fff',marginBottom:8}}>
          {[
            {icon:'cart',label:'购物车',badge:cartCnt||null,onClick:()=>goTab('cart')},
            {icon:'task',label:'任务中心',onClick:()=>{}},
            {icon:'gift',label:'赠品',onClick:()=>{}},
          ].map(m=>(
            <div key={m.label} onClick={m.onClick}
              style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',
                borderBottom:'1px solid #f5f5f5',cursor:'pointer'}}>
              <MIcon name={m.icon} size={20}/>
              <span style={{flex:1,fontSize:14,color:'#333'}}>{m.label}</span>
              {m.badge&&<span style={{background:'#ff3b30',color:'#fff',borderRadius:10,fontSize:10,
                padding:'1px 6px',fontWeight:600}}>{m.badge}</span>}
              <Chevron/>
            </div>
          ))}
        </div>

        <div style={{background:'#fff',marginBottom:16}}>
          <div onClick={()=>setPage('address')}
            style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',cursor:'pointer'}}>
            <svg width="20"height="20"viewBox="0 0 20 20"fill="none">
              <path d="M10 2C7.24 2 5 4.24 5 7c0 3.75 5 10 5 10s5-6.25 5-10c0-2.76-2.24-5-5-5z"stroke="#555"strokeWidth="1.5"/>
              <circle cx="10"cy="7"r="2"stroke="#555"strokeWidth="1.5"/>
            </svg>
            <span style={{flex:1,fontSize:14,color:'#333'}}>收货地址</span>
            <Chevron/>
          </div>
        </div>
      </Sv>
    </Scr>
  );
}

/* ══════════════════════════════════
   APP ROOT
══════════════════════════════════ */
function App(){
  const [tab,setTab]=useState('home');
  const [cart,setCart]=useState([]);
  const [addresses,setAddresses]=useState([]);
  const [orders,setOrders]=useState([]);
  const [userInfo,setUserInfo]=useState({name:'',phone:'155****7281',gender:'',birthday:'',region:''});

  const props={cart,setCart,addresses,setAddresses,orders,setOrders,userInfo,setUserInfo,goTab:setTab};
  const cnt=cart.reduce((s,i)=>s+i.qty,0);

  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',
      minHeight:'100vh',background:'linear-gradient(135deg,#0f0f14 0%,#1a1a2e 100%)'}}>
      <div style={{width:390,height:844,borderRadius:50,overflow:'hidden',
        boxShadow:'0 0 0 11px #1c1c1e,0 0 0 12px #2a2a2e,0 50px 120px rgba(0,0,0,0.85)',
        background:'#f5f5f5',display:'flex',flexDirection:'column',position:'relative'}}>

        <div style={{flex:1,overflow:'hidden',position:'relative'}}>
          {tab==='home'&&<HomeTab {...props}/>}
          {tab==='shop'&&<ShopTab {...props}/>}
          {tab==='cart'&&<CartTab {...props}/>}
          {tab==='wholesale'&&<WholesaleTab {...props}/>}
          {tab==='mine'&&<MineTab {...props}/>}
        </div>

        <TabBar active={tab} onChange={setTab} cnt={cnt}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
